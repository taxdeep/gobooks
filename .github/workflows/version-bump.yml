name: Auto-bump version build code

on:
  push:
    branches: [main]

jobs:
  bump-version:
    # Skip if the push was already from this workflow to avoid infinite loops.
    if: "!startsWith(github.event.head_commit.message, 'chore(version):')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version build code
        id: ver
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re
          import sys

          alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"

          def to_base36(value: int) -> str:
              if value < 0 or value >= 36**4:
                  raise ValueError("build code overflow")
              chars = []
              for _ in range(4):
                  chars.append(alphabet[value % 36])
                  value //= 36
              return "".join(reversed(chars))

          def from_base36(code: str) -> int:
              value = 0
              for char in code:
                  value = value * 36 + alphabet.index(char)
              return value

          text = pathlib.Path("internal/version/version.go").read_text(encoding="utf-8")
          match = re.search(r'Version\s*=\s*"([^"]+)"', text)
          if not match:
              print("missing Version constant", file=sys.stderr)
              sys.exit(1)

          parts = match.group(1).split(".")
          if len(parts) < 3:
              print(f"invalid version: {match.group(1)}", file=sys.stderr)
              sys.exit(1)

          major = int(parts[0])
          minor = int(parts[1])
          patch = int(parts[2])
          build = parts[3].upper() if len(parts) >= 4 else "0000"
          if not re.fullmatch(r"[0-9A-Z]{4}", build):
              build = "0000"

          next_build = to_base36(from_base36(build) + 1)
          core = f"{major}.{minor:02d}.{patch:03d}"
          version = f"{core}.{next_build}"

          print(f"major={major}")
          print(f"minor={minor}")
          print(f"patch={patch}")
          print(f"build={next_build}")
          print(f"core={core}")
          print(f"version={version}")
          PY

      - name: Write version.go
        run: |
          cat > internal/version/version.go <<'GOEOF'
          // Package version holds the application release string.
          package version

          const (
          	// Major, Minor, and Patch are decimal release components.
          	Major = ${{ steps.ver.outputs.major }}
          	Minor = ${{ steps.ver.outputs.minor }}
          	Patch = ${{ steps.ver.outputs.patch }}

          	// BuildCode is a fixed-width uppercase base36 build counter.
          	BuildCode = "${{ steps.ver.outputs.build }}"

          	// Version format: M.mm.ppp.BBBB
          	// M/mm/ppp are decimal; BBBB is a four-character base36 build code.
          	Version = "${{ steps.ver.outputs.version }}"
          )
          GOEOF

      - name: Commit and push
        run: |
          git config user.name  "GoBooks CI"
          git config user.email "ci@gobooks.local"
          git add internal/version/version.go
          # Only commit if there is an actual change
          if git diff --staged --quiet; then
            echo "version.go unchanged, skipping commit"
          else
            git commit -m "chore(version): bump to ${{ steps.ver.outputs.version }}"
            git push
          fi
